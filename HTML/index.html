<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Blog</title>

  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>

    <button id="homeBtn">Home</button>
    <button id="myPostsBtn">Mis Posts</button>

    <h1>Mini Blog</h1>

    <button id="createBtn">Crear Post</button>

  </header>


  <!-- SECTION HOME -->
  <section id="homeSection">

    <!-- BUSCADOR -->
    <div class="search-container">

      <input 
        type="text"
        id="searchInput"
        placeholder="Buscar posts..."
      >

      <button id="searchBtn">Buscar</button>
      

    </div>

    <!-- FILTROS -->
  <div class="filters-container">
    <input 
      type="number"
      id="filterUserId"
      placeholder="Filtrar por User ID"
    >
    <input 
      type="text"
      id="filterTag"
      placeholder="Filtrar por tag (ej: love)"
    >
    <input 
      type="number"
      id="filterMinLikes"
      placeholder="Likes mínimos"
    >
    <button id="filterBtn">Filtrar</button>
    </div>


    <!-- UI STATES -->

    <div id="idleState">
      Escribe algo para buscar posts o carga los posts.
    </div>

    <div id="loadingState" class="hidden">
      Loading posts...
    </div>

    <div id="emptyState" class="hidden">
      No posts found.
    </div>

    <div id="errorState" class="hidden">
      Error loading posts.
      <button id="retryBtn">Retry</button>
    </div>


    <!-- LISTA DE POSTS -->

    <div id="postsContainer">

      <!-- aquí JS insertará posts -->

    </div>

     <div id="pagination"></div>
  </section>


  <!-- SECTION CREATE -->

  <section id="createSection" class="hidden">

    <h2>Crear Post</h2>

    <form id="createPostForm">

      <label>Title</label>
      <input
        type="text"
        id="titleInput"
        required
      >

      <label>Body</label>
      <textarea
        id="bodyInput"
        required
      ></textarea>

      <label>User ID</label>
      <input
        type="number"
        id="userIdInput"
        required
      >

      <button type="submit">
        Crear Post
      </button>

    </form>

  </section>

  <!-- SECTION DETAIL -->

  <section id="detailSection" class="hidden">
    <button id="backToHomeBtn">← Volver</button>

    <h2>Detalle del Post</h2>

    <div class="post-detail">
      <p><strong>ID:</strong> <span id="detailId"></span></p>
      <p><strong>User ID:</strong> <span id="detailUserId"></span></p>
      <p><strong>Title:</strong> <span id="detailTitleText"></span></p>
      <p><strong>Body:</strong></p>
      <p id="detailBody"></p>
      <p><strong>Views:</strong> <span id="detailViews"></span></p>
      <p><strong>Likes:</strong> <span id="detailLikes"></span></p>
      <p><strong>Dislikes:</strong> <span id="detailDislikes"></span></p>
      <p><strong>Tags:</strong> <span id="detailTags"></span></p>

      <h3>Raw API data</h3>
      <pre id="detailRaw"></pre>
    </div>
  </section>

  <!-- Section My Posts -->
  <section id="myPostsSection" class="hidden">
    <h2>Mis Posts</h2>
    <div id="myPostsContainer">
      <!-- aquí JS insertará posts -->
    </div>
  </section>

  <!-- JS -->
 <script type="module" src="../js/main.js"></script>

</body>
</html>
